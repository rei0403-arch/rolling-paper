<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>롤링페이퍼 다운로드</title>
  <style>
    :root {
      --paper: #f7f5ef;
      --ink: #23211d;
      --muted: #6d675e;
      --line: #ddd7ca;
      --card: #ffffff;
      --accent: #2e7d6b;
      --accent-dark: #1d594c;
      --rose: #d26c72;
      --blue: #3f6f9f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    main {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
      gap: 44px;
      align-items: center;
      width: min(1080px, calc(100% - 40px));
      margin: 0 auto;
      padding: 56px 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(40px, 7vw, 78px);
      line-height: 0.94;
      letter-spacing: 0;
    }

    .lead {
      max-width: 560px;
      margin: 22px 0 30px;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 22px;
      border-radius: 8px;
      color: #fff;
      background: var(--accent);
      font-size: 17px;
      font-weight: 750;
      text-decoration: none;
    }

    .download:focus-visible,
    .download:hover {
      background: var(--accent-dark);
    }

    .note {
      color: var(--muted);
      font-size: 14px;
    }

    .phone {
      position: relative;
      min-height: 640px;
      border: 12px solid #1f1f1f;
      border-radius: 34px;
      background: #fbfaf7;
      box-shadow: 0 28px 70px rgba(35, 33, 29, 0.22);
      overflow: hidden;
    }

    .screen {
      padding: 24px 20px;
    }

    .status {
      display: inline-block;
      margin: 14px 0 20px;
      padding: 9px 12px;
      border-radius: 8px;
      color: var(--accent-dark);
      background: #e7f2ed;
      font-size: 13px;
      font-weight: 700;
    }

    .room {
      margin-bottom: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
    }

    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .code {
      margin-top: 5px;
      font-size: 24px;
      font-weight: 850;
    }

    .message {
      margin-bottom: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .message strong {
      display: block;
      margin-bottom: 8px;
      color: var(--accent-dark);
      font-size: 14px;
    }

    .message p {
      margin: 0;
      font-size: 16px;
      line-height: 1.5;
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 28px;
    }

    .tag {
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.62);
      font-size: 13px;
      font-weight: 700;
    }

    @media (max-width: 840px) {
      main {
        grid-template-columns: 1fr;
        padding: 34px 0;
      }

      .phone {
        min-height: 520px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section>
      <h1>롤링페이퍼</h1>
      <p class="lead">
        방 코드를 공유하고, 멀리 있는 친구들도 같은 종이에 메시지를 붙일 수 있는 안드로이드 앱이야.
        앱은 Realtime Database 스트림으로 새 메시지를 바로 확인해.
      </p>
      <div class="actions">
        <a class="download" href="./rolling-paper-debug.apk" download>APK 다운로드</a>
        <span class="note">Android 8.0 이상 권장</span>
      </div>
      <div class="tag-row" aria-label="앱 기능">
        <span class="tag">방 코드 공유</span>
        <span class="tag">닉네임 메시지</span>
        <span class="tag">실시간 반영</span>
        <span class="tag">Firebase 저장</span>
      </div>
    </section>

    <aside class="phone" aria-label="앱 화면 미리보기">
      <div class="screen">
        <h2>롤링페이퍼</h2>
        <div class="status">실시간 연결됨</div>
        <div class="room">
          <div class="label">방</div>
          <div class="code">A7K2QD</div>
        </div>
        <div class="message">
          <strong>지민</strong>
          <p>멀리 있어도 여기다 한 장씩 붙이면 된다.</p>
        </div>
        <div class="message">
          <strong>민서</strong>
          <p>마지막에 다 같이 열어보면 꽤 재밌을 듯.</p>
        </div>
        <div class="message">
          <strong>서윤</strong>
          <p>이 방 코드 절대 잃어버리지 말기.</p>
        </div>
      </div>
    </aside>
  </main>
</body>
</html>
